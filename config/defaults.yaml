risk:
  max_daily_drawdown_pct: 0.05
  max_single_asset_exposure_pct: 0.20
  max_correlated_exposure_pct: 0.30
  max_risk_per_trade_pct: 0.02
  max_slippage_pct: 0.003

regime:
  classification_interval_seconds: 900
  ema_period: 200
  bollinger_period: 20
  bollinger_std_dev: 2.0
  volatile_bollinger_width_multiplier: 2.0

signals:
  min_confluence_score: 3
  rsi_oversold_threshold: 30
  rsi_overbought_threshold: 70
  rsi_period: 14
  funding_rate_extreme_positive: 0.001
  funding_rate_extreme_negative: -0.001
  whale_concentration_max_pct: 0.50

execution:
  min_volume_24h_usd: 10000000
  latency_skip_threshold_ms: 300
  candle_timeframe_minimum: "15m"

sessions:
  overnight_trough_utc_start: "07:00"
  overnight_trough_utc_end: "11:00"
  aggressive_strategies_pause_during_trough: true
